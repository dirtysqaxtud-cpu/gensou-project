  function getRarityClass(rarity) {
    switch (rarity) {
      case "N": return "rarity-n";
      case "R": return "rarity-r";
      case "SR": return "rarity-sr";
      case "SSR": return "rarity-ssr";
      case "???": return "rarity-unknown";
      default: return "";
    }
  }

  function formatNumber(no) {
    return `No.${String(no).padStart(3, "0")}`;
  }

  function pickRarity() {
    const totalWeight = rarityRates.reduce((sum, item) => sum + item.weight, 0);
    let random = Math.random() * totalWeight;

    for (const entry of rarityRates) {
      random -= entry.weight;
      if (random < 0) {
        return entry.rarity;
      }
    }

    return "N";
  }

  function drawCollection() {
    const selectedRarity = pickRarity();
    const candidates = aoCollections.filter(item => item.rarity === selectedRarity);
    const item = candidates[Math.floor(Math.random() * candidates.length)];

    obtained.add(item.no);
    renderCatalog();

    const rarityClass = getRarityClass(item.rarity);
    const resultArea = document.getElementById("resultArea");

    resultArea.innerHTML = `
      <div class="result-card">
        <div class="result-top">
          <div class="result-number">${formatNumber(item.no)}</div>
          <div class="result-rarity ${rarityClass}">${item.rarity}</div>
        </div>
        <div class="result-name">${item.name}</div>
        <div class="result-line">${item.line}</div>
        <div class="result-desc">${item.desc}</div>

        ${item.rarity === "???" ? `
          <div style="margin-top:20px;">
            <button class="collection-button" onclick="openGensofu()">
              幻想譜をみる
            </button>
          </div>
        ` : ""}
      </div>
    `;

    if (item.rarity === "???") {
      document.body.style.transition = "0.3s";
      document.body.style.background = "#000";

      setTimeout(() => {
        alert("——観測不能な記録を検出——\n\n幻想域の真実に、近づいているかもしれない。\n\n終わりは、終わりにならない。");
        document.body.style.background = "";
      }, 300);
    }
  }

  function renderCatalog() {
    const area = document.getElementById("catalogArea");

    area.innerHTML = aoCollections.map(item => {
      const isOwned = obtained.has(item.no);

      return `
        <div class="catalog-item">
          <div class="catalog-top">
            <div class="catalog-number">${formatNumber(item.no)}</div>
            <div class="catalog-rarity ${getRarityClass(item.rarity)}">${item.rarity}</div>
          </div>
          <div class="catalog-name ${isOwned ? "" : "unknown-name"}">
            ${isOwned ? item.name : "？？？"}
          </div>
          <div class="catalog-line ${isOwned ? "" : "unknown-line"}">
            ${isOwned ? item.line : "未観測"}
          </div>
        </div>
      `;
    }).join("");
  }

  function openSecretPrompt() {
    const pass = prompt("アクセスキーを入力してください");

    if (pass === "幻想譜") {
      openGensofu(true);
    } else if (pass !== null) {
      alert("……認識できない記録です");
    }
  }

  function openGensofu(isDirect = false) {
    const resultArea = document.getElementById("resultArea");

    resultArea.innerHTML = `
      <div class="result-card">
        <div class="result-top">
          <div class="result-number">No.100</div>
          <div class="result-rarity rarity-unknown">???</div>
        </div>
        <div class="result-name">幻想譜</div>
        <div class="result-line">「終わりは、終わりにならない。」</div>
        <div class="result-desc">
          それは記録ではない。断片でもない。存在が消えたあとに残されるはずの何かでもない。<br><br>
          幻想域において、存在は記録によって支えられ、記録を失えば消えるはずだった。<br>
          だがこの『幻想譜』は、そのすべての前提の外側にある。<br><br>
          これは終わりの記録であり、同時に始まりの記録でもある。<br>
          ある存在が消滅したという事実と、その存在が別の形で再び現れるという結果が、ひとつの“譜”として重なっている。<br><br>
          見た目も、記憶も、在り方も変わる。<br>
          だがそれでもなお、それは確かに“同じ存在”である。<br><br>
          この世界における永遠とは、不変であることではない。<br>
          変わり続けることで、同じであり続けるということだ。<br><br>
          幻想譜は、その循環そのものを記録している。
        </div>
      </div>
    `;

    if (isDirect) {
      alert("——記録外アクセスを確認——\n\n幻想譜への接続を許可しました。");
    }
  }

  renderCatalog();
</script>

</body>
</html>
