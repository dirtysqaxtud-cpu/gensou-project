<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>関係図 | 幻想プロジェクト</title>

</head>

<body>

<header>
    <h1>関係図</h1>
    <p>幻想域における循環構造</p>
</header>

<nav>
    <a href="index.html">ホーム</a>
    <a href="world.html">世界観</a>
    <a href="characters.html">キャラクター</a>
    <a href="relations.html">関係図</a>
    <a href="story.html">ストーリー</a>
    <a href="glossary.html">用語集</a>
    <a href="submit.html">記録提出</a>
</nav>

<main>

<section>
    <h2>循環する存在</h2>

    <div class="circle-container">

        <img src="circle-bg.jpg" class="circle-bg">

        <!-- 上 -->
        <div class="circle yura">
            <span class="name">譜守ユラ</span>
            <span class="role">保持者</span>
            <div class="tooltip">記録を維持し、存在を保つ者</div>
        </div>

        <!-- 右 -->
        <div class="circle aoi">
            <span class="name">綴目アオ</span>
            <span class="role">収集者</span>
            <div class="tooltip">失われた記録を集め続ける者</div>
        </div>

        <!-- 下 -->
        <div class="circle rewrite">
            <span class="name">Rewrite</span>
            <span class="role">改変者</span>
            <div class="tooltip">記録を書き換え世界を変える者</div>
        </div>

        <!-- 左 -->
        <div class="circle reno">
            <span class="name">零乃</span>
            <span class="role">消去者</span>
            <div class="tooltip">存在と記録を断つ空白の存在</div>
        </div>

    </div>

</section>

<section>
    <h2>補足</h2>
    <p>
        幻想域は循環している。<br>
        保持 → 収集 → 改変 → 消去。
    </p>
</section>

</main>

</body>
</html>
