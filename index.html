    <section>
        <h2>幻想とは何か</h2>
        <p class="lead">
            記録は、存在を生む。<br>
            だが、それは同時に――消滅の始まりでもある。
        </p>
    </section>

    <section>
        <h2>概要</h2>
        <p>
            現界で生まれた記録は、幻想域へと流れ、存在を形作る。<br>
            しかし今、その流れは途絶え始めている。<br><br>

            存在を守る者、集める者、書き換える者、そして消し去る者。<br>
            幻想域は静かに崩壊へと向かっている。
        </p>
    </section>
